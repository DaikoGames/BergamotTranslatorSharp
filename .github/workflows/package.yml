          mkdir build
          cd build
          # ARM64 Cross-Compile erfordert angepassten Triplet und Architektur-Typ
          cmake .. -A ARM64 `
            -DBUILD_ARCH=arm64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DUSE_STATIC_LIBS=ON `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DVCPKG_TARGET_TRIPLET=arm64-windows-static `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic
        shell: powershell

