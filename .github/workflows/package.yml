name: Package

on:
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # WINDOWS X64
  # ----------------------------------------------------
  win-x64:
    runs-on: windows-latest
    name: Build Windows Native Lib (x64)
    env:
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}\\vcpkg\\"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create Build Environment
        run: cmake -E make_directory "${{ github.workspace }}/build"

      - name: Configure & Build
        working-directory: ${{ github.workspace }}/build
        run: |
          cmake .. -A x64 -DBUILD_ARCH=corei7-avx -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DVCPKG_TARGET_TRIPLET=x64-windows-static -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: libs-win-x64
          path: libs/*

  # ----------------------------------------------------
  # WINDOWS ARM64 (Cross-Compilation via MSVC)
  # ----------------------------------------------------
  win-arm64:
    runs-on: windows-latest
    name: Build Windows Native Lib (arm64)
    env:
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}\\vcpkg\\"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create Build Environment
        run: cmake -E make_directory "${{ github.workspace }}/build"

      - name: Configure & Build
        working-directory: ${{ github.workspace }}/build
        run: |
          cmake .. -A ARM64 -DBUILD_ARCH=arm64 -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DVCPKG_TARGET_TRIPLET=arm64-windows-static -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: libs-win-arm64
          path: libs/*

  # ----------------------------------------------------
  # LINUX X64
  # ----------------------------------------------------
  linux-x64:
    runs-on: ubuntu-latest
    name: Build Linux Native Lib (x64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libprotobuf-dev protobuf-compiler libboost-all-dev libunwind-dev gperftools libgoogle-perftools-dev
          wget -qO- "https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB" | sudo apt-key add -
          sudo sh -c "echo deb https://apt.repos.intel.com/mkl all main > /etc/apt/sources.list.d/intel-mkl.list"
          sudo apt-get update -o Dir::Etc::sourcelist="/etc/apt/sources.list.d/intel-mkl.list"
          sudo apt-get install -y --no-install-recommends intel-mkl-64bit-2020.0-088

      - name: Build & Install
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-x64
          path: libs/*

  # ----------------------------------------------------
  # LINUX ARM64 (Nativer ARM-Runner)
  # ----------------------------------------------------
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    name: Build Linux Native Lib (arm64)
    continue-on-error: true # Falls der ARM-Runner in deiner GitHub-Organisation nicht aktiv ist
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libprotobuf-dev protobuf-compiler libboost-all-dev libunwind-dev gperftools || sudo apt-get install -y libprotobuf-dev protobuf-compiler libboost-all-dev

      - name: Build & Install
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON -DUSE_MKL=OFF
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-arm64
          path: libs/*

  # ----------------------------------------------------
  # MACOS ARM64
  # ----------------------------------------------------
  macos-arm64:
    runs-on: macos-latest
    name: Build macOS Native Lib (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install protobuf boost cmake llvm@18 gperftools

      - name: Build & Install
        run: |
          LLVM_PREFIX="$(brew --prefix llvm@18)"
          GPERFTOOLS_PREFIX="$(brew --prefix gperftools)"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER="$LLVM_PREFIX/bin/clang" \
            -DCMAKE_CXX_COMPILER="$LLVM_PREFIX/bin/clang++" \
            -DGPERFTOOLS_ROOT="$GPERFTOOLS_PREFIX" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_STATIC_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DGIT_SUBMODULE=OFF
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-macos-arm64
          path: libs/*

  # ----------------------------------------------------
  # .NET PACK & PUBLISH
  # ----------------------------------------------------
  dotnet:
    runs-on: ubuntu-latest
    name: Build .NET Lib
    needs:
      - win-x64
      - win-arm64
      - linux-x64
      - linux-arm64
      - macos-arm64
    if: always() # Läuft immer, egal ob ein nativer Build gefailt ist
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: "5.x"

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3.1.11
        
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: libs
          merge-multiple: true
          
      - run: |
          dotnet pack BergamotTranslatorSharp -c Release -o pack \
            -p:Version=${{ steps.gitversion.outputs.fullSemVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: pack/*

      - if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
        run: dotnet nuget push pack/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

      - if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
