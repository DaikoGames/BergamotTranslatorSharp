name: Package

on:
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # WINDOWS X64
  # ----------------------------------------------------
  win-x64:
    runs-on: windows-latest
    name: Build Windows Native Lib (x64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies via vcpkg
        shell: powershell
        run: |
          $env:VCPKG_REBUILD="true"
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install protobuf boost-system boost-thread boost-program-options gperftools --triplet x64-windows-static --classic

      - name: Configure & Build
        shell: powershell
        run: |
          mkdir build
          cd build
          cmake .. -A x64 `
            -DBUILD_ARCH=corei7-avx `
            -DCMAKE_BUILD_TYPE=Release `
            -DUSE_STATIC_LIBS=ON `
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-win-x64
          path: libs/*

 # ----------------------------------------------------
  # WINDOWS ARM64 (Native Runner Mode)
  # ----------------------------------------------------
  win-arm64:
    runs-on: windows-11-arm
    name: Build Windows Native Lib (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies via vcpkg
        shell: powershell
        run: |
          $env:VCPKG_REBUILD="true"
          $env:VCPKG_DEFAULT_TRIPLET="arm64-windows-static"
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install protobuf boost-system boost-thread boost-program-options pcre2 --triplet arm64-windows-static --classic

      - name: Configure & Build
        shell: powershell
        run: |
          mkdir build
          cd build
          
          # Wir fügen CMAKE_LIBRARY_OUTPUT_DIRECTORY hinzu, um MSVC-Unterordner zu umgehen!
          cmake .. -A ARM64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DUSE_STATIC_LIBS=ON `
            -DUSE_MKL=OFF `
            -DCOMPILE_CPU=ON `
            -DCOMPILE_SERVER=OFF `
            -DUSE_VECTOR_EXTENSIONS=OFF `
            -DENABLE_SIMD=OFF `
            -DCOMPILE_WASM=OFF `
            -DCOMPILE_AVX=OFF `
            -DUSE_SSE=OFF `
            "-DCMAKE_LIBRARY_OUTPUT_DIRECTORY=." `
            "-DCMAKE_RUNTIME_OUTPUT_DIRECTORY=." `
            "-DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=." `
            "-DCMAKE_CXX_FLAGS_RELEASE=/MD /O2 /Ob2 /DNDEBUG" `
            "-DCMAKE_C_FLAGS_RELEASE=/MD /O2 /Ob2 /DNDEBUG" `
            "-DVCPKG_MANIFEST_MODE=OFF" `
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" `
            -DVCPKG_TARGET_TRIPLET=arm64-windows-static `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          
          # Sicherheitsnetz: Falls MSVC die DLL trotzdem in /Release/ abgelegt hat, kopieren wir sie hoch!
          if (Test-Path "bergamot-translator-dynamic\Release\bergamot.dll") {
              Move-Item "bergamot-translator-dynamic\Release\bergamot.dll" "bergamot-translator-dynamic\" -Force
          }
          
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-win-arm64
          path: libs/*

          
  # ----------------------------------------------------
  # LINUX X64
  # ----------------------------------------------------
  linux-x64:
    runs-on: ubuntu-latest
    name: Build Linux Native Lib (x64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libprotobuf-dev protobuf-compiler libboost-all-dev libunwind-dev libgoogle-perftools-dev libmkl-dev

      - name: Build & Install
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON -DUSE_MKL=ON
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-x64
          path: libs/*

  # ----------------------------------------------------
  # LINUX ARM64
  # ----------------------------------------------------
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    name: Build Linux Native Lib (arm64)
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libprotobuf-dev protobuf-compiler libboost-all-dev libunwind-dev libgoogle-perftools-dev

      - name: Build & Install
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON -DUSE_MKL=OFF
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-arm64
          path: libs/*

  # ----------------------------------------------------
  # MACOS ARM64
  # ----------------------------------------------------
  macos-arm64:
    runs-on: macos-latest
    name: Build macOS Native Lib (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install protobuf boost cmake llvm@18 gperftools

      - name: Build & Install
        run: |
          LLVM_PREFIX="$(brew --prefix llvm@18)"
          GPERFTOOLS_PREFIX="$(brew --prefix gperftools)"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER="$LLVM_PREFIX/bin/clang" \
            -DCMAKE_CXX_COMPILER="$LLVM_PREFIX/bin/clang++" \
            -DGPERFTOOLS_ROOT="$GPERFTOOLS_PREFIX" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_STATIC_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DGIT_SUBMODULE=OFF
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-macos-arm64
          path: libs/*

  # ----------------------------------------------------
  # .NET PACK
  # ----------------------------------------------------
  dotnet:
    runs-on: ubuntu-latest
    name: Build .NET Lib
    needs:
      - win-x64
      - win-arm64
      - linux-x64
      - linux-arm64
      - macos-arm64
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: "5.x"

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3.1.11
        
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: libs
          merge-multiple: true
          
      - run: |
          dotnet pack BergamotTranslatorSharp -c Release -o pack \
            -p:Version=${{ steps.gitversion.outputs.fullSemVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: pack/*

      - if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
        run: dotnet nuget push pack/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

      - if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
