name: Package

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: [v*.*.*]
  pull_request:
    branches: ["**"]

jobs:
  win:
    runs-on: windows-latest
    name: Build Windows x64 Native Lib
    continue-on-error: true
    env:
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}/vcpkg"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC x64 Tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: win-x64-${{ github.ref }}
          restore-keys: win-x64-

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-windows-x64-${{ github.sha }}
          restore-keys: vcpkg-windows-x64-

      - name: Configure & Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja \
            -DBUILD_ARCH=corei7-avx \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_STATIC_LIBS=ON \
            -DVCPKG_TARGET_TRIPLET="x64-windows-static" \
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs/runtimes/win-x64/native" --component bergamot_translator_dynamic
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: libs-win-x64
          path: libs/*

  win-arm64:
    runs-on: windows-latest
    name: Build Windows ARM64 Native Lib
    continue-on-error: true
    env:
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}/vcpkg"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Strip Intel MKL from vcpkg.json (Python Fix)
        shell: python
        run: |
          import json
          import os
          if os.path.exists('vcpkg.json'):
              with open('vcpkg.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              if 'dependencies' in data:
                  data['dependencies'] = [
                      d for d in data['dependencies'] 
                      if (isinstance(d, str) and d != 'intel-mkl') or (isinstance(d, dict) and d.get('name') != 'intel-mkl')
                  ]
              with open('vcpkg.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, indent=2)
              print("vcpkg.json erfolgreich modifiziert!")

      - name: Set up MSVC x64-ARM64 Cross Tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: win-arm64-${{ github.ref }}
          restore-keys: win-arm64-

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-windows-arm64-${{ github.sha }}
          restore-keys: vcpkg-windows-arm64-

      - name: Configure & Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_STATIC_LIBS=ON \
            -DUSE_MKL=OFF \
            -DVCPKG_TARGET_TRIPLET="arm64-windows-static" \
            -DVCPKG_HOST_TRIPLET="x64-windows" \
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs/runtimes/win-arm64/native" --component bergamot_translator_dynamic
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: libs-win-arm64
          path: libs/*

  linux:
    runs-on: ubuntu-latest
    name: Build Linux x64 Native Lib
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-x64-${{ github.ref }}
          restore-keys: linux-x64-

      - name: Install Dependencies
        run: |-
          sudo apt-get update
          sudo apt-get install -y libprotobuf-dev protobuf-compiler libboost-all-dev libunwind-dev libgoogle-perftools-dev
          
      - name: Install MKL
        run: |-
          wget -qO- "https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB" | sudo apt-key add -
          sudo sh -c "echo deb https://apt.repos.intel.com/mkl all main > /etc/apt/sources.list.d/intel-mkl.list"
          sudo apt-get update -o Dir::Etc::sourcelist="/etc/apt/sources.list.d/intel-mkl.list"
          sudo apt-get install -y --no-install-recommends intel-mkl-64bit-2020.0-088

      - name: Configure & Build
        run: |-
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs/runtimes/linux-x64/native" --component bergamot_translator_dynamic

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-x64
          path: libs/*

  linux-arm64:
    runs-on: ubuntu-latest
    name: Build Linux ARM64 Native Lib
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-arm64-${{ github.ref }}
          restore-keys: linux-arm64-
          
      - name: Setup Multi-Arch Repositories (Ubuntu Clean Fix)
        run: |
          sudo dpkg --add-architecture arm64
          # Wir fügen die Ports-Repositorys für arm64 hinzu, ohne die Standardquellen zu löschen
          sudo tee /etc/apt/sources.list.d/arm64-ports.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble main universe restricted multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-updates main universe restricted multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-security main universe restricted multiverse
          EOF
          
          # Bestehende main Repositories explizit auf amd64/i386 einschränken, um Konflikte zu vermeiden
          sudo sed -i 's/deb http/deb [arch=amd64,i386] http/g' /etc/apt/sources.list || true
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/Architectures: amd64 i386/Architectures: amd64 i386/g' /etc/apt/sources.list.d/ubuntu.sources || true
          fi
          
          sudo apt-get update

      - name: Install Cross-Compile Dependencies
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                                 protobuf-compiler libprotobuf-dev:arm64 \
                                 libboost-all-dev:arm64 libunwind-dev:arm64 \
                                 libgoogle-perftools-dev:arm64 libopenblas-dev:arm64
          
      - name: Configure & Build
        run: |-
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DProtobuf_PROTOC_EXECUTABLE=/usr/bin/protoc \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MKL=OFF \
            -DUSE_STATIC_LIBS=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs/runtimes/linux-arm64/native" --component bergamot_translator_dynamic
          
      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-arm64
          path: libs/*

  dotnet:
    runs-on: ubuntu-latest
    name: Build .NET Lib
    needs:
      - win
      - win-arm64
      - linux
      - linux-arm64
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: "5.x"
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3.1.11

      - name: Download Windows x64 Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: libs-win-x64
          path: BergamotTranslatorSharp

      - name: Download Windows ARM64 Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: libs-win-arm64
          path: BergamotTranslatorSharp

      - name: Download Linux x64 Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: libs-linux-x64
          path: BergamotTranslatorSharp

      - name: Download Linux ARM64 Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: libs-linux-arm64
          path: BergamotTranslatorSharp

      - name: Run .NET Pack
        run: |
          dotnet pack BergamotTranslatorSharp -c Release -o pack \
            -p:Version=${{ steps.gitversion.outputs.fullSemVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: pack/*
      - if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
        run: dotnet nuget push pack/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
      - if: ${{ success() && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
