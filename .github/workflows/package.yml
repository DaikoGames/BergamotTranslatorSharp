name: Package

on:
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # WINDOWS X64
  # ----------------------------------------------------
  win-x64:
    runs-on: windows-latest
    name: Build Windows Native Lib (x64)
    env:
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}\\vcpkg\\"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create Build Environment
        run: cmake -E make_directory "${{ github.workspace }}/build"

      - name: Configure & Build
        working-directory: ${{ github.workspace }}/build
        shell: powershell
        run: |
          cmake .. -A x64 -DBUILD_ARCH=corei7-avx -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DVCPKG_TARGET_TRIPLET=x64-windows-static -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          mkdir build
          cd build
          # Nutzt die korrekte GitHub-Variable für vcpkg
          cmake .. -A x64 `
            -DBUILD_ARCH=corei7-avx `
            -DCMAKE_BUILD_TYPE=Release `
            -DUSE_STATIC_LIBS=ON `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          
          cmake --build . --config Release -j3 --target bergamot_translator_dynamic
          cmake --install . --prefix "../libs" --component bergamot_translator_dynamic
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: libs-win-x64
          path: libs/*

